name: 台股四訊號選股

on:
  schedule:
    # 台灣時間 09:30、13:00 執行
    # UTC 01:30、05:00 = 台灣時間 09:30、13:00
    - cron: '30 1,5 * * 1-5'
  workflow_dispatch:   # 允許手動觸發（測試用）

jobs:
  screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests

      - name: 執行四訊號選股
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_screener.py
