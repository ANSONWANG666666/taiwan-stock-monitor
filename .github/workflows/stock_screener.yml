name: 台股四訊號選股

on:
  schedule:
    # 09:30 早盤異動 (UTC 01:30 = 台灣時間 09:30)
    - cron: '30 1 * * 1-5'
    # 13:00 盤中確認 (UTC 05:00 = 台灣時間 13:00)
    - cron: '0 5 * * 1-5'
    # 14:00 收盤確認 (UTC 06:00 = 台灣時間 14:00)
    - cron: '0 6 * * 1-5'
  workflow_dispatch:   # 允許手動觸發（測試用）

jobs:
  screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests

      - name: 執行四訊號選股
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_screener.py
